name: Pull Request

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  auto-bump-version:
    name: Auto-bump patch version if needed
    runs-on: ubuntu-latest
    # Skip if this push was made by the bot itself (avoid re-trigger loop)
    if: github.actor != 'github-actions[bot]'
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Bump patch version if not already ahead of latest release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/maxspect/manifest.json'))['version'])")
          LATEST_TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 \
            --exclude-pre-releases --json tagName --jq '.[0].tagName // ""')

          if [ -z "$LATEST_TAG" ]; then
            echo "No stable release found. Using manifest version $MANIFEST_VERSION."
            echo "version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_VERSION="${LATEST_TAG#v}"

          NEW_VERSION=$(python3 - <<EOF
from packaging.version import Version

def clean(v):
    return v.strip().lstrip("v").split("-")[0]

manifest = Version(clean("$MANIFEST_VERSION"))
latest   = Version(clean("$LATEST_VERSION"))

if manifest <= latest:
    bumped = Version(f"{latest.major}.{latest.minor}.{latest.micro + 1}")
    print(bumped)
else:
    print(manifest)
EOF
)

          if [ "$NEW_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Bumping version: $MANIFEST_VERSION → $NEW_VERSION"
            python3 -c "
import json
with open('custom_components/maxspect/manifest.json', 'r+') as f:
    data = json.load(f)
    data['version'] = '$NEW_VERSION'
    f.seek(0)
    json.dump(data, f, indent=2)
    f.write('\n')
    f.truncate()
"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add custom_components/maxspect/manifest.json
            git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
            git push
          else
            echo "Version $MANIFEST_VERSION is already ahead of $LATEST_VERSION. No bump needed."
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs: auto-bump-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-asyncio homeassistant

      - name: Run tests
        run: pytest --tb=short -v

  beta-release:
    name: Publish beta prerelease
    runs-on: ubuntu-latest
    needs: [auto-bump-version, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Determine next beta tag
        id: beta_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.auto-bump-version.outputs.version }}"

          EXISTING=$(gh release list --repo "${{ github.repository }}" --limit 100 \
            --json tagName --jq '.[].tagName' | grep "^v${VERSION}-beta" || true)

          if [ -z "$EXISTING" ]; then
            TAG="v${VERSION}-beta"
          else
            MAX=1
            while IFS= read -r tag; do
              NUM=$(echo "$tag" | sed "s/^v${VERSION}-beta//")
              [ -z "$NUM" ] && NUM=1
              [ "$NUM" -gt "$MAX" ] 2>/dev/null && MAX=$NUM
            done <<< "$EXISTING"
            TAG="v${VERSION}-beta$((MAX + 1))"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create zip archive
        run: zip -r maxspect.zip custom_components/maxspect/

      - name: Publish beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.beta_tag.outputs.tag }}
          name: ${{ steps.beta_tag.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: maxspect.zip
