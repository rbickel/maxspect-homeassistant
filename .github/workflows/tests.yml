name: Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate manifest version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version is greater than latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/maxspect/manifest.json'))['version'])")

          LATEST_TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName // ""')

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing release found. Accepting version $MANIFEST_VERSION."
            exit 0
          fi

          LATEST_VERSION="${LATEST_TAG#v}"

          python3 - <<EOF
          import re
          from packaging.version import Version

          def normalize(v):
              v = v.strip().lstrip("v")
              v = re.sub(r"[-.]?(alpha|a)\.?(\d*)$", lambda m: f"a{m.group(2) or '0'}", v, flags=re.I)
              v = re.sub(r"[-.]?(beta|b)\.?(\d*)$",  lambda m: f"b{m.group(2) or '0'}", v, flags=re.I)
              v = re.sub(r"[-.]?(rc|preview)\.?(\d*)$", lambda m: f"rc{m.group(2) or '0'}", v, flags=re.I)
              return v

          raw_manifest = "$MANIFEST_VERSION"
          raw_latest   = "$LATEST_VERSION"
          manifest = Version(normalize(raw_manifest))
          latest   = Version(normalize(raw_latest))
          if manifest <= latest:
              print(f"ERROR: manifest.json version ({raw_manifest}) must be greater than the latest release ({raw_latest}).")
              raise SystemExit(1)
          print(f"OK: {raw_manifest} > {raw_latest}")
          EOF

  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-asyncio homeassistant

      - name: Run tests
        run: pytest --tb=short -v

  beta-release:
    name: Publish beta release
    runs-on: ubuntu-latest
    needs: [validate-version, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get manifest version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/maxspect/manifest.json'))['version'])")
          # Strip leading v and any pre-release suffix (e.g. 0.3.7-beta -> 0.3.7)
          VERSION="${VERSION#v}"
          VERSION="${VERSION%%-*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine next beta tag
        id: beta_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          EXISTING=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName \
            --jq '.[].tagName' | grep "^v${VERSION}-beta" || true)

          if [ -z "$EXISTING" ]; then
            TAG="v${VERSION}-beta"
          else
            MAX=1
            while IFS= read -r tag; do
              NUM=$(echo "$tag" | sed "s/^v${VERSION}-beta//")
              [ -z "$NUM" ] && NUM=1
              [ "$NUM" -gt "$MAX" ] 2>/dev/null && MAX=$NUM
            done <<< "$EXISTING"
            TAG="v${VERSION}-beta$((MAX + 1))"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next beta tag: $TAG"

      - name: Create zip archive
        run: zip -r maxspect.zip custom_components/maxspect/

      - name: Create beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.beta_tag.outputs.tag }}
          name: ${{ steps.beta_tag.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: maxspect.zip
